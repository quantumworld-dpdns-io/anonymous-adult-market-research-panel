# Supabase local development configuration
# https://supabase.com/docs/guides/cli/config

project_id = "anonymous-adult-market-research-panel"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
heartbeat_interval_ms = 15000
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false

[auth]
enabled = true
# Researchers authenticate via email/OAuth; participants use ZK tokens (not Supabase Auth)
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
otp_length = 6
otp_expiry = 3600
template_dir = "./templates/emails"

[auth.email.smtp]
host = "127.0.0.1"
port = 54325
admin_email = "admin@example.com"
sender_name = "Panel Auth"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.github]
enabled = true
client_id = "env(AUTH_GITHUB_CLIENT_ID)"
secret = "env(AUTH_GITHUB_SECRET)"
redirect_uri = ""

[auth.external.google]
enabled = true
client_id = "env(AUTH_GOOGLE_CLIENT_ID)"
secret = "env(AUTH_GOOGLE_SECRET)"
redirect_uri = ""

[auth.third_party.firebase]
enabled = false

[auth.third_party.auth0]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
