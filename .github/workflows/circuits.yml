name: ZK Circuit CI

on:
  push:
    paths:
      - "circuits/**"
      - ".github/workflows/circuits.yml"
  pull_request:
    paths:
      - "circuits/**"

permissions:
  contents: read
  id-token: write

env:
  NARGO_VERSION: "1.0.0-beta.20"

jobs:
  noir-circuit:
    name: Noir Age-Proof Circuit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install noirup
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH

      - name: Install Nargo ${{ env.NARGO_VERSION }}
        run: noirup --version ${{ env.NARGO_VERSION }}

      - name: Verify Nargo version
        run: nargo --version

      - name: Check age-proof circuit
        working-directory: circuits/age-proof
        run: nargo check

      - name: Run circuit tests
        working-directory: circuits/age-proof
        run: nargo test --show-output

      - name: Compile circuit (ACIR)
        working-directory: circuits/age-proof
        run: nargo compile

      - name: Print circuit info (gate count)
        working-directory: circuits/age-proof
        run: nargo info

      - name: Verify artifact integrity
        working-directory: circuits/age-proof
        run: |
          sha256sum target/age_proof.json > target/age_proof.json.sha256
          cat target/age_proof.json.sha256

      - name: Upload circuit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: circuit-artifacts-${{ github.sha }}
          path: |
            circuits/age-proof/target/age_proof.json
            circuits/age-proof/target/age_proof.json.sha256
          retention-days: 90

      - name: Check artifact hash unchanged (regression guard)
        if: github.event_name == 'pull_request'
        working-directory: circuits/age-proof
        run: |
          if [ -f target/age_proof.json.sha256.baseline ]; then
            diff target/age_proof.json.sha256 target/age_proof.json.sha256.baseline || \
              (echo "::warning::Circuit artifact hash changed — review carefully" && exit 0)
          fi

  fuzz:
    name: Nargo Fuzz (scheduled only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          noirup --version ${{ env.NARGO_VERSION }}
      - name: Fuzz age-proof circuit
        working-directory: circuits/age-proof
        run: nargo fuzz --timeout 120
