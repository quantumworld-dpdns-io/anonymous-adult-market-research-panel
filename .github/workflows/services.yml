name: Services CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - "apps/**"
      - ".github/workflows/services.yml"
  pull_request:
    paths:
      - "services/**"
      - "apps/**"

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────
  # Go API Gateway
  # ─────────────────────────────
  go-gateway:
    name: Go API Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api-gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/api-gateway/coverage.out
          flags: api-gateway

  # ─────────────────────────────
  # Rust ZK Proving Service
  # ─────────────────────────────
  rust-zk-proving:
    name: Rust ZK Proving Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/zk-proving
    env:
      RISC0_DEV_MODE: "1"  # Use dev mode in CI (no real proof generation)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/zk-proving

      - name: Install cargo-risczero
        run: cargo install cargo-risczero --locked
        continue-on-error: true  # May fail if already cached

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all --features dev-mode

  # ─────────────────────────────
  # Python Analytics Service
  # ─────────────────────────────
  python-analytics:
    name: Python Analytics Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/analytics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Test
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────
  # Python Quantum Service
  # ─────────────────────────────
  python-quantum:
    name: Python Quantum Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/quantum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/quantum/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest pytest-asyncio httpx

      - name: Test (Aer simulator only — no IBM account in CI)
        run: pytest tests/ -v --tb=short -m "not ibm_quantum"

  # ─────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────
  nextjs-frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          API_GATEWAY_URL: http://localhost:8081

      - name: Unit tests
        run: npm test -- --passWithNoTests

  # ─────────────────────────────
  # Docker image builds
  # ─────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [go-gateway, rust-zk-proving, python-analytics, python-quantum, nextjs-frontend]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - zk-proving
          - analytics
          - quantum
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/quantumworld-dpdns-io/panel-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/quantumworld-dpdns-io/panel-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
