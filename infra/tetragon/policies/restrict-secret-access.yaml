apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: restrict-secret-file-access
  namespace: default
  annotations:
    description: "Kill any process accessing secret paths outside its authorized mount"
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        # Block access to secret paths from unauthorized binaries
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/secrets"
                - "/run/secrets"
                - "/var/secrets"
                - "/proc/1/environ"
          matchNamespaces:
            - namespace: default
          matchCapabilities:
            - type: Effective
              operator: NotIn
              values:
                - "CAP_SYS_ADMIN"
          matchActions:
            - action: Sigkill
        # Allow ZK proving service to read only its own secret mount
        - matchBinaries:
            - operator: In
              values:
                - "/usr/local/bin/zk-proving-service"
          matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/run/secrets/zk-proving"
          matchActions:
            - action: Post
        # Allow api-gateway its secrets only
        - matchBinaries:
            - operator: In
              values:
                - "/usr/local/bin/api-gateway"
          matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/run/secrets/api-gateway"
          matchActions:
            - action: Post
